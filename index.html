<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학급 청소당번 뽑기</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236,72,153,.3), transparent 35%),
        linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
    }

    .number-card {
      animation: pop .35s ease both;
    }

    @keyframes pop {
      0% { transform: scale(.3) translateY(20px); opacity: 0; }
      80% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center p-4">

  <main class="glass-card rounded-5 p-4 p-md-5 text-center text-white w-100" style="max-width: 620px;">
    <div class="mb-4">
      <span class="badge rounded-pill text-bg-warning px-3 py-2 mb-3">
        CLASS CLEANING PICKER
      </span>

      <h1 class="fw-bold display-6 mb-3">
        🧹 3-3반 학급 청소당번 뽑기
      </h1>

      <p class="text-white-50 mb-0">
        1번부터 30번까지 중복 없이 랜덤으로 5명을 선발합니다.
      </p>
    </div>

    <div class="bg-white bg-opacity-10 rounded-4 p-3 p-md-4 mb-4">
      <div id="result" class="grid grid-cols-5 gap-3 min-h-[90px] place-items-center">
        <div class="text-white-50 col-span-5">
          버튼을 눌러 청소당번을 뽑아보세요
        </div>
      </div>
    </div>

    <button
      onclick="pickStudents()"
      class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold shadow-lg
             hover:scale-105 transition-transform duration-200">
      ✨ 당번 뽑기
    </button>

    <div class="mt-4 text-white-50 small">
      공정한 랜덤 추첨으로 5명을 선정합니다.
    </div>
  </main>

  <script>
    function pickStudents() {
      const students = [];

      while (students.length < 5) {
        const randomNumber = Math.floor(Math.random() * 30) + 1;

        if (!students.includes(randomNumber)) {
          students.push(randomNumber);
        }
      }

      students.sort((a, b) => a - b);

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      students.forEach((number, index) => {
        setTimeout(() => {
          const card = document.createElement("div");
          card.className =
            "number-card w-16 h-16 md:w-20 md:h-20 rounded-3xl " +
            "bg-gradient-to-br from-yellow-300 to-orange-400 " +
            "text-slate-900 flex items-center justify-center " +
            "text-2xl md:text-3xl font-black shadow-xl";

          card.style.animationDelay = `${index * 0.08}s`;
          card.textContent = number;
          resultDiv.appendChild(card);
        }, index * 150);
      });

      setTimeout(() => {
        Swal.fire({
          title: "오늘의 청소당번!",
          html: `
            <div style="font-size:28px; font-weight:800; margin:20px 0;">
              ${students.map(num => `<span style="margin:0 8px;">${num}번</span>`).join("")}
            </div>
            <p style="color:#64748b;">깨끗한 교실을 부탁해요 🧼</p>
          `,
          icon: "success",
          confirmButtonText: "확인",
          confirmButtonColor: "#2563eb",
          background: "#ffffff",
          color: "#0f172a"
        });
      }, 900);
    }
  </script>

</body>
</html>
